trigger_rules:
  mape_threshold: 0.03
  min_directional_accuracy: 0.50
  min_interval_95_coverage: 0.85
  max_abs_prediction_bias_pct: 0.02
  trigger_on_medium_drift: true
  trigger_on_high_drift: true
  trigger_on_extreme_risk: true
  trigger_on_interval_undercoverage: true

allowed_decisions:
  - MONITOR
  - TRAIN_CHALLENGER
  - MANUAL_REVIEW

allowed_diagnoses:
  - MODEL_OK
  - OVERFITTING
  - UNDERFITTING
  - FEATURE_DRIFT
  - TARGET_DRIFT
  - CONCEPT_DRIFT
  - REGIME_SHIFT
  - INTERVAL_UNDERCOVERAGE
  - PREDICTION_BIAS
  - NEWS_EVENT_DRIVEN
  - INSUFFICIENT_EVIDENCE

allowed_strategies:
  - NO_ACTION
  - REDUCE_OVERFIT
  - INCREASE_MODEL_CAPACITY
  - RETRAIN_RECENT_WINDOW
  - WIDEN_INTERVAL
  - ADD_REGULARIZATION
  - STABILIZE_MODEL
